name: Deploy

on:
  push:
    branches:
      - main
      - staging
      - production
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check secrets are available
        shell: bash
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" || -z "$VERCEL_TOKEN" ]]; then
            echo "::warning::Required secrets not configured yet — skipping deploy (provisioning likely still in progress)"
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Resolve target branch
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          # repository_dispatch always runs on the default branch, so GITHUB_REF_NAME
          # is always "main". We need the actual target from client_payload.
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "TARGET_BRANCH=${{ github.event.client_payload.branch || 'main' }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.SKIP_DEPLOY != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup pnpm
        if: env.SKIP_DEPLOY != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        if: env.SKIP_DEPLOY != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: env.SKIP_DEPLOY != 'true'
        run: pnpm install --frozen-lockfile

      - name: Resolve environment mapping
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${TARGET_BRANCH}"

          case "${BRANCH}" in
            main)
              echo "DEPLOY_ENV=dev" >> "$GITHUB_ENV"
              echo "SUPABASE_PROJECT_REF=${{ secrets.DEV_SUPABASE_PROJECT_REF }}" >> "$GITHUB_ENV"
              echo "SUPABASE_DB_PASSWORD=${{ secrets.DEV_SUPABASE_DB_PASSWORD }}" >> "$GITHUB_ENV"
              echo "SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
              echo "SUPABASE_ANON_KEY=${{ secrets.DEV_SUPABASE_ANON_KEY }}" >> "$GITHUB_ENV"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"
              echo "VERCEL_ENVIRONMENT=preview" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "DEPLOY_ENV=staging" >> "$GITHUB_ENV"
              echo "SUPABASE_PROJECT_REF=${{ secrets.STAGING_SUPABASE_PROJECT_REF }}" >> "$GITHUB_ENV"
              echo "SUPABASE_DB_PASSWORD=${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}" >> "$GITHUB_ENV"
              echo "SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}" >> "$GITHUB_ENV"
              echo "SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}" >> "$GITHUB_ENV"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"
              echo "VERCEL_ENVIRONMENT=preview" >> "$GITHUB_ENV"
              ;;
            production)
              echo "DEPLOY_ENV=prod" >> "$GITHUB_ENV"
              echo "SUPABASE_PROJECT_REF=${{ secrets.PROD_SUPABASE_PROJECT_REF }}" >> "$GITHUB_ENV"
              echo "SUPABASE_DB_PASSWORD=${{ secrets.PROD_SUPABASE_DB_PASSWORD }}" >> "$GITHUB_ENV"
              echo "SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> "$GITHUB_ENV"
              echo "SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}" >> "$GITHUB_ENV"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"
              echo "VERCEL_ENVIRONMENT=production" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch ${BRANCH}" >&2
              exit 1
              ;;
          esac

      - name: Setup Supabase CLI
        if: env.SKIP_DEPLOY != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        if: env.SKIP_DEPLOY != 'true'
        env:
          SUPABASE_DB_PASSWORD: ${{ env.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          # Auto-repair: capture push output; on failure extract remote-only
          # migration versions from the error and mark them as reverted.
          PUSH_OUTPUT=$(supabase db push 2>&1) && echo "$PUSH_OUTPUT" || {
            echo "$PUSH_OUTPUT"
            REPAIR_VERSION=$(echo "$PUSH_OUTPUT" | grep -oE "repair --status reverted [0-9]+" | grep -oE "[0-9]+" | head -1)
            while [ -n "$REPAIR_VERSION" ]; do
              echo "Repairing remote-only migration: $REPAIR_VERSION"
              supabase migration repair --status reverted "$REPAIR_VERSION"
              PUSH_OUTPUT=$(supabase db push 2>&1) && { echo "$PUSH_OUTPUT"; break; } || {
                echo "$PUSH_OUTPUT"
                REPAIR_VERSION=$(echo "$PUSH_OUTPUT" | grep -oE "repair --status reverted [0-9]+" | grep -oE "[0-9]+" | head -1)
              }
            done
          }
      - name: Deploy edge functions
        if: env.SKIP_DEPLOY != 'true'
        run: |
          for fn in ingredients-list ingredients-create ingredients-delete; do
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
          done

      - name: Supabase smoke check
        if: env.SKIP_DEPLOY != 'true'
        run: |
          curl --fail --silent --show-error \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/functions/v1/ingredients-list" >/tmp/ingredients-list.json

          grep -q '"ingredients"' /tmp/ingredients-list.json

      - name: Build and deploy frontend to Vercel
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [[ "$VERCEL_ENVIRONMENT" == "production" ]]; then
            PROD_FLAG="--prod"
          else
            PROD_FLAG=""
          fi

          pnpm dlx vercel@latest pull --yes \
            --environment "$VERCEL_ENVIRONMENT" \
            --token "$VERCEL_TOKEN"

          echo "VITE_SUPABASE_URL=$SUPABASE_URL" >> .env.local
          echo "VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env.local

          pnpm dlx vercel@latest build $PROD_FLAG \
            --token "$VERCEL_TOKEN"

          DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt $PROD_FLAG \
            --token "$VERCEL_TOKEN" \
            --meta githubCommitRef="$TARGET_BRANCH" \
            --meta deploymentEnvironment="$DEPLOY_ENV")

          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
